name: test

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  verify-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cmd/skillflow/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: cmd/skillflow/frontend
        run: npm ci

      - name: Run Go tests
        run: make test

      - name: Run frontend unit tests
        working-directory: cmd/skillflow/frontend
        run: npm run test:unit

      - name: Build frontend
        working-directory: cmd/skillflow/frontend
        run: npm run build
